<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Bird Tracker Map</title>

    <script>
      L_DISABLE_3D = true;
    </script>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #dfe6ec;
      }

      #map {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background: #dfe6ec;
      }

      .leaflet-container {
        width: 100%;
        height: 100%;
        background: #dfe6ec;
        font: 12px/1.2 system-ui, sans-serif;
      }

      .tile-debug {
        position: absolute;
        right: 10px;
        top: 10px;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #bbb;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        color: #333;
        display: none;
      }

      .status {
        position: absolute;
        left: 10px;
        top: 10px;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid #bbb;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="tileDebug" class="tile-debug"></div>
    <div id="status" class="status">Waiting for /data/track.json</div>

    <script>
      const pathRenderer = L.canvas({ padding: 0.5 });

      const map = L.map("map", {
        center: [38.9007, -77.05],
        zoom: 13,
        minZoom: 3,
        maxZoom: 19,
        preferCanvas: true,
        renderer: pathRenderer,
        zoomControl: true,
        attributionControl: true,
        zoomAnimation: false,
        fadeAnimation: false,
        markerZoomAnimation: false,
        inertia: false,
        zoomSnap: 1,
        zoomDelta: 1,
        trackResize: true,
      });

      const tileDebug = document.getElementById("tileDebug");
      const statusBox = document.getElementById("status");

      const tiles = L.tileLayer(
        "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
          attribution: "&copy; OpenStreetMap contributors",
          tileSize: 256,
          detectRetina: false,
          updateWhenIdle: true,
          updateWhenZooming: false,
          keepBuffer: 6,
          noWrap: false,
        }
      );

      tiles.on("tileerror", function (e) {
        tileDebug.style.display = "block";
        tileDebug.textContent =
          "Tile load issue at z=" +
          e.coords.z +
          " x=" +
          e.coords.x +
          " y=" +
          e.coords.y;
      });

      tiles.addTo(map);

      const path = L.polyline([], {
        renderer: pathRenderer,
        weight: 4,
        smoothFactor: 1,
        noClip: false,
      }).addTo(map);

      let marker = null;
      let hasInitialFix = false;
      let lastDrawnSeq = -1;

      function ensureMarker(point) {
        if (!marker) {
          marker = L.marker(point, { keyboard: false }).addTo(map);
        } else {
          marker.setLatLng(point);
        }
      }

      function clearTrack() {
        path.setLatLngs([]);
        if (marker) {
          map.removeLayer(marker);
          marker = null;
        }
        hasInitialFix = false;
      }

      function drawTrack(points) {
        if (!points.length) {
          clearTrack();
          return;
        }

        const latlngs = points.map((p) => [p.lat, p.lon]);
        path.setLatLngs(latlngs);
        ensureMarker(latlngs[latlngs.length - 1]);

        if (!hasInitialFix) {
          hasInitialFix = true;
          if (latlngs.length === 1) {
            map.setView(latlngs[0], 14, { animate: false });
          } else {
            map.fitBounds(path.getBounds(), {
              padding: [40, 40],
              animate: false,
            });
          }
          return;
        }

        marker.setLatLng(latlngs[latlngs.length - 1]);
      }

      function onHostResize() {
        map.invalidateSize({
          pan: false,
          debounceMoveend: true,
        });
      }

      async function refreshTrack() {
        try {
          const response = await fetch(`/data/track.json?ts=${Date.now()}`, {
            cache: "no-store",
          });

          if (!response.ok) {
            statusBox.textContent = `track.json unavailable (${response.status})`;
            return;
          }

          const data = await response.json();
          const points = Array.isArray(data.points) ? data.points : [];

          if (!points.length) {
            clearTrack();
            lastDrawnSeq = -1;
            statusBox.textContent = "No offloaded points yet";
            return;
          }

          const newestSeq = points[points.length - 1].seq;
          if (newestSeq !== lastDrawnSeq) {
            drawTrack(points);
            lastDrawnSeq = newestSeq;
          }

          statusBox.textContent = `Loaded ${points.length} point${points.length === 1 ? "" : "s"}`;
        } catch (error) {
          console.error("Failed to load track.json:", error);
          statusBox.textContent = "Error loading /data/track.json";
        }
      }

      window.addEventListener("load", function () {
        requestAnimationFrame(function () {
          onHostResize();
        });
      });

      window.addEventListener("resize", onHostResize);

      refreshTrack();
      setInterval(refreshTrack, 3000);
    </script>
  </body>
</html>
